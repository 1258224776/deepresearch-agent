openapi: 3.1.0
info:
  title: DeepResearch Agent API
  version: 1.2.0
  description: >
    HTTP wrapper for the DeepResearch ReAct workflow. Returns the final report,
    step trace, structured observations, deduplicated references, and built-in
    skill metadata.
servers:
  - url: https://buccaneer-recent-dropout.ngrok-free.dev
    description: Public tunnel to the local service
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /skills:
    get:
      operationId: listBuiltInSkills
      summary: List available built-in skills
      description: >
        Return the built-in skill catalog used by the ReAct agent, including
        category, required arguments, optional arguments, and descriptions.
      responses:
        "200":
          description: Skill catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_skills:
                    type: integer
                    description: Number of registered built-in skills
                  categories:
                    type: array
                    description: Skill categories
                    items:
                      type: string
                  skills:
                    type: array
                    description: Available built-in skills
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        category:
                          type: string
                        required_args:
                          type: array
                          items:
                            type: string
                        optional_args:
                          type: array
                          items:
                            type: string
                        args_desc:
                          type: object
                          additionalProperties:
                            type: string
                        returns_sources:
                          type: boolean
  /run:
    post:
      operationId: runDeepResearchAgent
      summary: Run DeepResearch Agent
      description: >
        Execute the ReAct research workflow for a question and return the final
        markdown report, step trace, structured observations, and references.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
              properties:
                question:
                  type: string
                  description: Research question
                  example: What were Tesla's core financial metrics in 2024?
                engine:
                  type: string
                  description: Engine preset. Use "deep", "fast", or empty for auto.
                  default: ""
                  enum: ["", "deep", "fast"]
                max_steps:
                  type: integer
                  description: Maximum number of ReAct steps
                  default: 8
                  minimum: 3
                  maximum: 15
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                    description: Final markdown report
                  step_count:
                    type: integer
                    description: Actual number of executed steps
                  error:
                    type: string
                    nullable: true
                    description: Execution error, if any
                  references_md:
                    type: string
                    description: Markdown reference section
                  references:
                    type: array
                    description: Deduplicated references
                    items:
                      type: object
                      properties:
                        cite_id:
                          type: integer
                        url:
                          type: string
                        title:
                          type: string
                        snippet:
                          type: string
                  observations:
                    type: array
                    description: Structured observations collected during execution
                    items:
                      type: object
                      properties:
                        content:
                          type: string
                        tool:
                          type: string
                        args:
                          type: object
                          additionalProperties: true
                        cite_ids:
                          type: array
                          items:
                            type: integer
                        sources:
                          type: array
                          items:
                            type: object
                            properties:
                              url:
                                type: string
                              title:
                                type: string
                              snippet:
                                type: string
                  steps:
                    type: array
                    description: ReAct step trace
                    items:
                      type: object
                      properties:
                        thought:
                          type: string
                        tool:
                          type: string
                        args:
                          type: object
                          additionalProperties: true
                        observation:
                          type: string
                        cite_ids:
                          type: array
                          items:
                            type: integer
                        error_type:
                          type: string
                          nullable: true
                        sources:
                          type: array
                          items:
                            type: object
                            properties:
                              url:
                                type: string
                              title:
                                type: string
                              snippet:
                                type: string
        "400":
          description: Invalid request
